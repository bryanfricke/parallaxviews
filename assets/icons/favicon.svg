<!-- Simple, high-contrast cross favicon for Minimal Facts site -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Minimal Facts">
  <title>Minimal Facts</title>
  <!-- Darker teal background improves contrast for small-size favicons -->
  <rect width="100%" height="100%" fill="#00796B" rx="8"/>
  <!-- Slightly thicker beams hold up better at 16px while preserving the existing silhouette -->
  <g fill="#FFFFFF">
    <rect x="28" y="10" width="8" height="44" rx="2" />
    <rect x="14" y="24" width="36" height="8" rx="2" />
  </g>
</svg>
